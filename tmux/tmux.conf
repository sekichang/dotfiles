# ============================================================
# 基本設定
# ============================================================

# 起動シェルをfishにする
set-option -g default-shell /opt/homebrew/bin/fish
# Escキーの遅延をなくす
set -s escape-time 0
# ウィンドウ番号を1始まりにする
set-option -g base-index 1
# ペイン番号を1始まりにする
set-option -g pane-base-index 1
# ウィンドウを閉じたとき番号を詰める
set-option -g renumber-windows on
# スクロールバックの履歴行数
set -g history-limit 10000
# Neovim等のフォーカスイベントを有効にする
set -g focus-events on
# メッセージの表示時間 (ms)
set-option -g display-time 2000
# ペイン番号の表示時間 (ms)
set-option -g display-panes-time 2000

# ============================================================
# 表示・カラー
# ============================================================

# TrueColor (24bit) を有効にする
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"

# ============================================================
# ステータスバー
# ============================================================

# ステータスバーをトップに配置する
set-option -g status-position top
# 左右のステータスバーの長さを決定する
set-option -g status-left-length 100
set-option -g status-right-length 100
# ステータスバーの背景色
set-option -g status-bg "#1e1e2e"
# ステータスバーの文字色
set-option -g status-fg "#cdd6f4"
# メッセージスタイル
set-option -g message-style bg=#89dceb,fg=#1e1e2e
# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 1

# 左端に表示: [青: セッション名 →]
set-option -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e,nobold]"

# ウィンドウリスト: アクティブ / 非アクティブ
set-window-option -g window-status-format         "#[fg=#6c7086,bg=#1e1e2e] #I:#W"
set-window-option -g window-status-current-format "#[fg=#cba6f7,bg=#1e1e2e,bold] #I:#W"

# 右端に表示: [→ バッテリー残量] [→ 時刻]
set-option -g status-right '#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244] #(~/.config/tmux/get_battery.sh)#[fg=#cba6f7,bg=#313244]#[fg=#1e1e2e,bg=#cba6f7,bold] #(date +%m/%d\ %H:%M | sed s=/0=/=g | sed s=^0==) '

# ペインのボーダー色 (アクティブ / 非アクティブ)
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-style "fg=#45475a"
# ペインの背景色 (アクティブ / 非アクティブ)
set -g window-active-style "bg=#1e1e2e"
set -g window-style "bg=#181825"

# ============================================================
# キーバインド
# ============================================================

# 設定ファイルをリロードする
bind r source-file ~/.config/tmux/tmux.conf \; display " Reloaded!"

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 新規ウィンドウをカレントパスで開く
bind c new-window -c "#{pane_current_path}"

# | or \ でペインを左右に分割する
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
# - でペインを上下に分割する
bind - split-window -v -c "#{pane_current_path}"

# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# コピーモードでvimキーバインドを使う
setw -g mode-keys vi
# 'v' で選択を始める
bind -T copy-mode-vi v send -X begin-selection
# 'V' で行選択
bind -T copy-mode-vi V send -X select-line
# 'C-v' で矩形選択
bind -T copy-mode-vi C-v send -X rectangle-toggle
# 'y' でヤンク (pbcopy連携)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# 'Y' で行ヤンク
bind -T copy-mode-vi Y send -X copy-line
