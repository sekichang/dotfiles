[mgr]
# 隠しファイルの表示
show_hidden = true
# 更新日時の表示
linemode = "mtime_only"
# パネル比率（親/メイン/プレビュー)
ratio = [1, 3, 4]

[opener]
edit = [{ run = "nvim %*", block = true }]
# edit = [{ run = 'nvim "$@"', block = true }]

[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"
